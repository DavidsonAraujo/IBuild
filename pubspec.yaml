name: ibuild
description: iBuild — Plataforma de gestão de produção para engenharia e construção.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Backend / Auth ──────────────────────────────────────────
  supabase_flutter: ^2.5.0          # Supabase SDK (auth + realtime + storage)

  # ── Estado (State Management) ───────────────────────────────
  flutter_riverpod: ^2.5.1          # Estado global reativo
  riverpod_annotation: ^2.3.5       # Geração de código para providers

  # ── Banco Local / Offline ────────────────────────────────────
  drift: ^2.19.1                    # SQLite local (offline-first)
  drift_flutter: ^0.2.0             # Plugin SQLite para Flutter
  path_provider: ^2.1.3             # Caminhos do sistema de arquivos
  path: ^1.9.0

  # ── Navegação ────────────────────────────────────────────────
  go_router: ^17.1.0                # Roteamento declarativo

  # ── UI / UX ──────────────────────────────────────────────────
  google_fonts: ^8.0.2              # Tipografia
  flutter_svg: ^2.0.10+1            # Ícones e logos SVG
  cached_network_image: ^3.3.1      # Cache de imagens
  shimmer: ^3.0.0                   # Loading skeleton
  lottie: ^3.1.2                    # Animações Lottie
  fl_chart: ^1.2.0                 # Gráficos (EAP, dashboard)
  data_table_2: ^2.5.13             # Tabelas avançadas (web/tablet)

  # ── Formulários e Inputs ────────────────────────────────────
  flutter_form_builder: ^10.3.0+2      # Formulários complexos
  form_builder_validators: ^11.3.0  # Validadores
  mask_text_input_formatter: ^2.9.0 # Máscaras de input

  # ── Câmera / QR Code ────────────────────────────────────────
  mobile_scanner: ^7.2.0            # Scanner QR Code (tickets)
  image_picker: ^1.1.2              # Seleção de imagens

  # ── Arquivos / Exportação ───────────────────────────────────
  file_picker: ^10.3.10               # Seleção de arquivos (importação XLS)
  share_plus: ^12.0.1                # Compartilhar arquivos
  open_filex: ^4.5.1                # Abrir arquivos

  # ── PDF ──────────────────────────────────────────────────────
  pdf: ^3.11.1                      # Geração de PDF (FT, relatórios)
  printing: ^5.13.1                 # Preview e impressão de PDF

  # ── Conectividade / Sync ────────────────────────────────────
  connectivity_plus: ^7.0.0         # Status de rede
  internet_connection_checker_plus: ^2.5.0

  # ── Storage Local ───────────────────────────────────────────
  shared_preferences: ^2.3.1        # Preferências simples
  flutter_secure_storage: ^10.0.0    # Tokens e dados sensíveis

  # ── Utilitários ──────────────────────────────────────────────
  intl: any                         # Internacionalização e datas
  uuid: ^4.4.2                      # Geração de UUIDs (offline)
  equatable: ^2.0.5                 # Comparação de objetos
  freezed_annotation: ^2.4.4        # Imutabilidade de modelos
  json_annotation: ^4.9.0           # Serialização JSON
  collection: ^1.18.0               # Utilitários de coleções
  logger: ^2.4.0                    # Logging estruturado
  package_info_plus: ^9.0.0         # Versão do app

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Geração de código
  build_runner: ^2.4.11
  drift_dev: ^2.19.1
  riverpod_generator: ^2.4.3
  freezed: ^2.5.4
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # fonts:
  #   - family: IBuildSans
